<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grug Nation Rules</title>
  <style>
    /* Background */
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: #1a0a3a; /* Dark purple background */
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* Main container */
    .rules-container {
      position: relative;
      max-width: 700px;
      background: rgba(50, 0, 80, 0.9);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 40px rgba(128, 0, 255, 0.6);
      overflow: hidden;
    }

    /* Bubble effect */
    .bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(128, 0, 255, 0.3);
      animation: float 15s infinite linear;
    }

    @keyframes float {
      0% { transform: translateY(100vh) scale(0.5); }
      100% { transform: translateY(-200px) scale(1); }
    }

    /* Individual bubble sizes and positions */
    .bubble:nth-child(1) { width: 80px; height: 80px; left: 10%; animation-duration: 18s; }
    .bubble:nth-child(2) { width: 50px; height: 50px; left: 70%; animation-duration: 12s; }
    .bubble:nth-child(3) { width: 120px; height: 120px; left: 40%; animation-duration: 20s; }
    .bubble:nth-child(4) { width: 60px; height: 60px; left: 80%; animation-duration: 14s; }
    .bubble:nth-child(5) { width: 90px; height: 90px; left: 25%; animation-duration: 16s; }

    /* Rules list */
    h1 {
      text-align: center;
      color: #ffccff;
      text-shadow: 2px 2px 6px #8000ff;
      margin-bottom: 20px;
    }

    ol {
      font-size: 1.2rem;
      line-height: 2;
      padding-left: 20px;
    }

    ol li {
      margin-bottom: 15px;
    }
  </style>
</head>
<body>

  <div class="rules-container">
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>

    <h1>Grug Nation Rules</h1>
    <ol>
      <li>Be respectful to all members.</li>
      <li>No spamming, self-promotion, or advertising.</li>
      <li>Use channels for their intended purpose.</li>
      <li>No harassment, hate speech, or NSFW content.</li>
      <li>Listen to staff and follow Discord TOS.</li>
      <li>Have fun and enjoy the community!</li>
    </ol>
  </div>

</body>
</html>
